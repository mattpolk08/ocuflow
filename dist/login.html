<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OculoFlow — Staff Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .ring-focus:focus { outline: none; box-shadow: 0 0 0 2px #3b82f6; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center mb-4 shadow-2xl shadow-blue-900">
        <i class="fas fa-eye text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">OculoFlow</h1>
      <p class="text-slate-400 text-sm mt-1">Staff Authentication</p>
    </div>

    <!-- Login Card -->
    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 shadow-xl">

      <form id="loginForm" class="space-y-5">

        <!-- Error Banner -->
        <div id="errorBanner" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm flex items-center gap-2">
          <i class="fas fa-exclamation-circle flex-shrink-0"></i>
          <span id="errorMsg">Invalid email or password.</span>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">
              <i class="fas fa-envelope"></i>
            </span>
            <input
              id="email"
              type="email"
              autocomplete="email"
              required
              placeholder="you@oculoflow.com"
              class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl pl-10 pr-4 py-3 text-sm placeholder-slate-500 ring-focus hover:border-slate-500 transition-colors"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">
              <i class="fas fa-lock"></i>
            </span>
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              required
              placeholder="••••••••"
              class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl pl-10 pr-12 py-3 text-sm placeholder-slate-500 ring-focus hover:border-slate-500 transition-colors"
            />
            <button
              type="button"
              id="togglePwd"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors"
            >
              <i class="fas fa-eye" id="togglePwdIcon"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed text-white font-semibold rounded-xl py-3 text-sm transition-all duration-200 flex items-center justify-center gap-2"
        >
          <i class="fas fa-sign-in-alt" id="submitIcon"></i>
          <span id="submitLabel">Sign in</span>
        </button>

      </form>

    </div><!-- /Login Card -->

    <!-- Demo Credentials Panel (only shown in demo mode) -->
    <div id="demoPanel" class="hidden mt-6">
      <div class="bg-amber-500/5 border border-amber-500/20 rounded-2xl p-5">
        <div class="flex items-center gap-2 mb-4">
          <i class="fas fa-flask text-amber-400 text-sm"></i>
          <span class="text-xs font-semibold text-amber-400 uppercase tracking-wider">Demo Mode — Test Credentials</span>
        </div>
        <div id="credList" class="space-y-2"></div>
        <p class="text-xs text-slate-500 mt-4">Click any row to auto-fill the form.</p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-600 mt-6">
      OculoFlow EHR &mdash; Protected health information. Authorized users only.
    </p>

  </div><!-- /max-w-md -->

  <script src="/static/login.js"></script>
</body>
</html>
